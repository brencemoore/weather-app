<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
 	<!-- <meta name="apple-mobile-web-app-status-bar-style" content="black"> -->
	
	<title>Weather App</title>

    <!-- Web and App Icons -->
	<link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
	<link rel="manifest" href="images/site.webmanifest">

	<!-- CDNs -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body bg-gray>

	<div class="justify-content-center d-flex py-4">
		<div class="col-11">
			<div class="justify-content-center d-flex row py-5">

				<div class="col-12 text-center" id="divHeader">
					<h2><i class="bi bi-geo-alt-fill me-2"></i>City</h2>
				
					<p class="display-1 text-center"></i>100°</p>

					<p class="fs-3 text-center">Cloudy</p>

					<p class="fs-3 text-center">Feels like 50°</p>

				</div>

				<div class="row g-3">

					<div class="col-12 col-md-6">
						<div class="card" id="cardTempRange">
							<div class="card-body">
								<h3>Temperature Range: 50° - 60°</h3>
							</div>
						</div>
					</div>

					<div class="col-12 col-md-6">
						<div class="card" id="cardRain">
							<div class="card-body">
								<h3>Chance of Rain: 23%</h3>
							</div>
						</div>
					</div>

					<div class="col-12 col-md-6">
						<div class="card" id="cardHumidity">
							<div class="card-body">
								<h3>Humidity: 44%</h3>
							</div>
						</div>
					</div>

					<div class="col-12 col-md-6">
						<div class="card" id="cardSunTime">
							<div class="card-body">
								<h3>Sunrise: TIME</h3>
							</div>
						</div>
					</div>

					<div class="col-12">
						<div class="card" id="cardWind">
							<div class="card-body">
								<h3>Wind Speed: 90mph</h3>
								<h3>Wind Gust Speed: 200mph</h3>
								<h3>Wind Direction: 220°</h3>
							</div>
						</div>
					</div>

				</div>
			</div>
		</div>
	</div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

	<script>

		const strBaseWeatherUrl = 'https://api.open-meteo.com/v1/forecast'
		// ?latitude=52.52&longitude=13.41

		// Everything besides the latitude and longitude
		const strWeatherUrlReturnData = '&daily=temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_probability_max&models=best_match&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,rain,showers,snowfall,cloud_cover,weather_code,wind_direction_10m,wind_gusts_10m,wind_speed_10m&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch'


		// Get latitude and longitude (source: Geoapify)
		if ("geolocation" in navigator) {

			// Prompt user for permission to access their location
			navigator.geolocation.getCurrentPosition(

				// Success callback function
				(position) => {

					// Get the user's latitude and longitude coordinates
					const numUserLat = position.coords.latitude;
					const numUserLong = position.coords.longitude;

					// Validate lat and long
					console.log(`Latitude: ${numUserLat}, longitude: ${numUserLong}`);

					const strReverseGeoURL = 'https://api.bigdatacloud.net/data/reverse-geocode-client'

					// Fetch City name based off of lat and long
					// ?latitude=37.42159&longitude=-122.0837&localityLanguage=en
					fetch(strReverseGeoURL + `?latitude=${numUserLat}&longitude=${numUserLong}&localityLanguage=en`)

					.then(response => {
						if(!response.ok){
							throw new Error('Bad HTTP Response')
						}
						return response.json()
					})

					.then(data => {

						// Get User's city
						strUserCity = data.city
						console.log(strUserCity)
					})

					// Fetch weather data
					// ?latitude=52.52&longitude=13.41
					fetch(strBaseWeatherUrl + `?latitude=${numUserLat}&longitude=${numUserLong}` + strWeatherUrlReturnData)

					.then(response => {
						if(!response.ok) {
							throw new Error('Bad HTTP Response')
						}
						return response.json()
					})

					.then(data => {
						console.log(data)

						// strCurrTemp = data.
						
						// <i class="bi bi-thermometer"></i>
						// <i class="bi bi-thermometer-low"></i>
						// <i class="bi bi-thermometer-half">
						// <i class="bi bi-thermometer-high"></i>


							
					})
				},

				
				// Error callback function (User did not allow location sharing)
				(error) => {

					// Sweet alert to let user know that geolocation failed
					Swal.fire({
						icon: "error",
						title: "We can't get your location",
						text: "To view the weather, please ensure your settings allow this browser to access your location."
					});

					// Handle errors, e.g. user denied location sharing permissions
					console.error("Error getting user location:", error);
				}
			);
		} 
		// Geolocation is not supported by the browser
		else {

			// Sweet alert to let user know that geolocation failed
			Swal.fire({
				icon: "error",
				title: "We can't get your location",
				text: "Please ensure your browser can access your location."
			});

			console.error("Geolocation is not supported by this browser.");
		}



	</script>
</body>
</html>
